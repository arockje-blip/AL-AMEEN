<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Al Ameen Rolling Shutter - Project Gallery" />
    <title>Al Ameen Project Gallery</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7fa;
        --bg2: #edf2f7;
        --panel: rgba(25, 50, 70, 0.88);
        --panel-2: rgba(20, 42, 60, 0.85);
        --line: rgba(0, 208, 132, 0.12);
        --text: #152033;
        --muted: rgba(21, 32, 51, 0.72);
        --accent: #00d084;
        --accent2: #0066ff;
        --accent3: #ff9500;
        --max: 1200px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0e14;
          --bg2: #0f1319;
          --line: rgba(0, 208, 132, 0.15);
          --text: #e8f0f7;
          --muted: rgba(232, 240, 247, 0.65);
        }
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(0, 208, 132, 0.12), transparent 25%),
          radial-gradient(circle at top right, rgba(0, 102, 255, 0.08), transparent 22%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 45%, var(--bg2) 100%);
      }
      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(circle at top left, rgba(0, 208, 132, 0.08), transparent 30%),
            radial-gradient(circle at top right, rgba(0, 102, 255, 0.06), transparent 25%),
            linear-gradient(180deg, #0a0e14 0%, #0f1319 50%, #05070c 100%);
        }
      }
      a { color: inherit; text-decoration: none; }
      img { display: block; width: 100%; }
      .wrap { width: min(100%, var(--max)); margin: 0 auto; padding: 1.25rem; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.8rem 1rem;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(5, 11, 16, 0.72);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 1rem;
        z-index: 10;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #f4fbff;
      }
      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, rgba(61,220,132,0.16), rgba(46,167,255,0.12));
        border: 1px solid rgba(255,255,255,0.08);
        color: #3ddc84;
      }
      .hero {
        padding: 4rem 0 2rem;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.55rem 0.9rem;
        border-radius: 999px;
        border: 1px solid rgba(0, 208, 132, 0.18);
        background: rgba(0, 208, 132, 0.08);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 1rem 0 0;
        font-size: clamp(2.8rem, 8vw, 6rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
        text-transform: uppercase;
        max-width: 10ch;
        color: var(--text);
      }
      .hero p {
        max-width: 66ch;
        color: var(--muted);
        line-height: 1.8;
        font-size: 1.02rem;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.25rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        padding: 0.95rem 1.3rem;
        border-radius: 999px;
        font-weight: 800;
        border: 1px solid transparent;
      }
      .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 12px 28px rgba(0, 208, 132, 0.22); }
      .btn-ghost { background: rgba(255,255,255,0.6); border-color: rgba(15,23,42,0.08); color: var(--text); }
      @media (prefers-color-scheme: dark) {
        .btn-ghost { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); color: #e8f0f7; }
      }
      .gallery-shell {
        margin: 1.5rem 0 4rem;
        padding: 1.4rem;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.8rem;
        margin-bottom: 1rem;
      }
      .stat {
        padding: 1rem;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(25, 50, 70, 0.92), rgba(20, 42, 60, 0.88));
        border: 1px solid rgba(0, 208, 132, 0.12);
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.12);
      }
      .stat strong { display: block; font-size: 1.5rem; color: #fff; }
      .stat span { color: #d4e8f7; font-size: 0.85rem; }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1rem;
      }
      .card {
        overflow: hidden;
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(25, 50, 70, 0.92), rgba(20, 42, 60, 0.88));
        border: 1px solid rgba(0, 208, 132, 0.12);
        transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      }
      .card:hover {
        transform: translateY(-4px);
        border-color: rgba(0, 208, 132, 0.28);
        box-shadow: 0 16px 36px rgba(0, 208, 132, 0.12);
      }
      .card img {
        aspect-ratio: 1 / 1;
        object-fit: cover;
      }
      .meta {
        padding: 1rem 1rem 1.05rem;
      }
      .meta h2 {
        margin: 0 0 0.4rem;
        font-size: 1rem;
        line-height: 1.3;
        color: #ffffff;
      }
      .meta p {
        margin: 0;
        color: #d4e8f7;
        line-height: 1.55;
        font-size: 0.9rem;
      }
      .footer-note {
        margin: 1.2rem 0 0;
        color: var(--muted);
        text-align: center;
      }
      @media (max-width: 980px) {
        .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 720px) {
        :root {
          --max: 100%;
        }
        body {
          background:
            radial-gradient(circle at top left, rgba(0, 208, 132, 0.08), transparent 35%),
            radial-gradient(circle at top right, rgba(0, 102, 255, 0.06), transparent 25%),
            linear-gradient(180deg, #ffffff 0%, var(--bg) 50%, var(--bg2) 100%);
        }
        @media (prefers-color-scheme: dark) {
          body {
            background:
              radial-gradient(circle at top left, rgba(0, 208, 132, 0.06), transparent 35%),
              radial-gradient(circle at top right, rgba(0, 102, 255, 0.04), transparent 30%),
              linear-gradient(180deg, #0a0e14 0%, #0f1319 50%, #05070c 100%);
          }
        }
        .wrap {
          padding: 1rem 0.75rem;
        }
        .topbar {
          position: static;
          gap: 0.5rem;
          padding: 0.6rem 0.75rem;
          border-radius: 12px;
          margin-bottom: 1rem;
          flex-wrap: wrap;
        }
        .brand {
          gap: 0.6rem;
          font-size: 0.85rem;
          letter-spacing: 0.12em;
          flex: 1 1 auto;
        }
        .brand-mark {
          width: 36px;
          height: 36px;
          border-radius: 10px;
        }
        .hero {
          padding: 2rem 0 1.5rem;
        }
        h1 {
          font-size: clamp(1.8rem, 6vw, 2.8rem);
          margin: 0.75rem 0 0;
          max-width: 12ch;
        }
        .hero p {
          font-size: 0.95rem;
          line-height: 1.6;
          max-width: 50ch;
          margin-top: 0.75rem;
        }
        .eyebrow {
          font-size: 0.7rem;
          padding: 0.45rem 0.75rem;
          margin-bottom: 0.75rem;
        }
        .actions {
          gap: 0.5rem;
          margin-top: 1rem;
          flex-direction: column;
        }
        .btn {
          width: 100%;
          padding: 0.85rem 1rem;
          font-size: 0.9rem;
          gap: 0.5rem;
        }
        .gallery-shell {
          margin: 1rem 0 2rem;
          padding: 1rem;
          border-radius: 20px;
        }
        .grid, .stats { 
          grid-template-columns: 1fr;
          gap: 0.75rem;
        }
        .stat {
          padding: 0.85rem;
          border-radius: 14px;
        }
        .stat strong { 
          font-size: 1.2rem;
        }
        .stat span { 
          font-size: 0.8rem;
        }
        .card {
          border-radius: 16px;
        }
        .meta {
          padding: 0.85rem 0.85rem 0.9rem;
        }
        .meta h2 {
          font-size: 0.9rem;
          margin: 0 0 0.3rem;
        }
        .meta p {
          font-size: 0.8rem;
          line-height: 1.4;
        }
        .footer-note {
          font-size: 0.85rem;
          margin: 1rem 0 0;
        }
      }
      @media (max-width: 480px) {
        .wrap {
          padding: 0.75rem;
        }
        .topbar {
          flex-direction: column;
          gap: 0.5rem;
          padding: 0.5rem;
        }
        .brand {
          width: 100%;
          font-size: 0.8rem;
        }
        .topbar a:not(.brand) {
          width: 100%;
          text-align: center;
        }
        h1 {
          font-size: clamp(1.5rem, 5vw, 2.2rem);
          max-width: 15ch;
        }
        .hero {
          padding: 1.5rem 0 1rem;
        }
        .hero p {
          font-size: 0.9rem;
        }
        .btn {
          font-size: 0.85rem;
          padding: 0.75rem 0.9rem;
        }
        .actions {
          gap: 0.4rem;
        }
        .gallery-shell {
          padding: 0.85rem;
        }
        .card img {
          border-radius: 12px;
        }
        .meta {
          padding: 0.75rem 0.75rem 0.8rem;
        }
        .meta h2 {
          font-size: 0.85rem;
        }
        .meta p {
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="topbar">
        <a class="brand" href="index.html">
          <span class="brand-mark">A</span>
          <span>Al Ameen</span>
        </a>
        <a class="btn btn-ghost" href="index.html">Back to Home</a>
      </header>

      <section class="hero">
        <span class="eyebrow">Samples</span>
        <h1>Project Gallery</h1>
        <p>Sample pictures from the work we do. Open the full gallery to view every photo in one place.</p>
        <div class="actions">
          <a class="btn btn-primary" href="#gallery">Open Main Gallery</a>
          <a class="btn btn-ghost" href="index.html">Back to Home</a>
        </div>
      </section>

      <section class="gallery-shell" id="gallery">
        <div class="grid" id="galleryGrid"></div>
      </section>
    </div>
    <script src="gallery.js"></script>
  </body>
</html>
